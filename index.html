<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    .header {
      background: #4f46e5;
      color: #fff;
      padding: 28px 24px 20px;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .summary {
      font-size: 0.85rem;
      margin-top: 4px;
      opacity: 0.85;
    }

    .input-area {
      padding: 20px 24px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      gap: 8px;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #4f46e5;
    }

    .btn-add {
      padding: 10px 18px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .btn-add:hover { background: #4338ca; }
    .btn-add:active { background: #3730a3; }
    .btn-add:disabled { background: #a5b4fc; cursor: not-allowed; }

    .filter-bar {
      display: flex;
      gap: 0;
      padding: 12px 24px;
      border-bottom: 1px solid #e5e7eb;
    }

    .filter-btn {
      flex: 1;
      padding: 6px 0;
      border: 1.5px solid #e5e7eb;
      background: #fff;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.15s;
      color: #6b7280;
    }

    .filter-btn:first-child { border-radius: 6px 0 0 6px; }
    .filter-btn:last-child  { border-radius: 0 6px 6px 0; }
    .filter-btn:not(:first-child) { border-left: none; }

    .filter-btn.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
      font-weight: 600;
    }

    .list {
      list-style: none;
      padding: 8px 0;
      min-height: 80px;
    }

    .empty {
      text-align: center;
      color: #9ca3af;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      border-bottom: 1px solid #f3f4f6;
      animation: slideIn 0.18s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item:last-child { border-bottom: none; }

    .item-check {
      width: 20px;
      height: 20px;
      border: 2px solid #d1d5db;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .item-check:hover { border-color: #4f46e5; }

    .item.done .item-check {
      background: #4f46e5;
      border-color: #4f46e5;
    }

    .item.done .item-check::after {
      content: '';
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #111827;
      transition: all 0.15s;
      word-break: break-all;
    }

    .item.done .item-text {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: #d1d5db;
      font-size: 1.1rem;
      padding: 4px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .btn-delete:hover { color: #ef4444; }

    .footer {
      padding: 14px 24px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .count-label {
      font-size: 0.82rem;
      color: #6b7280;
    }

    .btn-clear {
      font-size: 0.82rem;
      color: #ef4444;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
    }

    .btn-clear:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🛒 쇼핑 리스트</h1>
    <div class="summary" id="summary">아이템 0개</div>
  </div>

  <div class="input-area">
    <input type="text" id="item-input" placeholder="아이템 입력 후 Enter 또는 추가 클릭" maxlength="80">
    <button class="btn-add" id="btn-add">추가</button>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">전체</button>
    <button class="filter-btn" data-filter="active">미완료</button>
    <button class="filter-btn" data-filter="done">완료</button>
  </div>

  <ul class="list" id="list"></ul>

  <div class="footer">
    <span class="count-label" id="count-label"></span>
    <button class="btn-clear" id="btn-clear">완료 항목 삭제</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://kwfcwlcupeihcpxkfyjf.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3ZmN3bGN1cGVpaGNweGtmeWpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2ODM4NzcsImV4cCI6MjA5NDI1OTg3N30.w8F1Zy1C6EZGguYyqjnUXeORC0yNIuImZFbfSyTSlGo';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let items = [];
  let filter = 'all';

  const listEl    = document.getElementById('list');
  const inputEl   = document.getElementById('item-input');
  const summaryEl = document.getElementById('summary');
  const countEl   = document.getElementById('count-label');
  const btnAdd    = document.getElementById('btn-add');
  const btnClear  = document.getElementById('btn-clear');

  function render() {
    const filtered = items.filter(item =>
      filter === 'all'    ? true :
      filter === 'active' ? !item.done :
                             item.done
    );

    listEl.innerHTML = '';

    if (filtered.length === 0) {
      listEl.innerHTML = '<li class="empty">아이템이 없습니다.</li>';
    } else {
      filtered.forEach(item => {
        const li = document.createElement('li');
        li.className = 'item' + (item.done ? ' done' : '');
        li.dataset.id = item.id;
        li.innerHTML = `
          <div class="item-check" title="완료 토글"></div>
          <span class="item-text">${escapeHtml(item.text)}</span>
          <button class="btn-delete" title="삭제">✕</button>
        `;
        listEl.appendChild(li);
      });
    }

    const total = items.length;
    const done  = items.filter(i => i.done).length;
    summaryEl.textContent = `총 ${total}개 · 완료 ${done}개`;
    countEl.textContent   = `미완료 ${total - done}개`;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function loadItems() {
    const { data, error } = await db
      .from('shopping_items')
      .select('*')
      .order('created_at', { ascending: false });
    if (!error) {
      items = data;
      render();
    }
  }

  async function addItem() {
    const text = inputEl.value.trim();
    if (!text) { inputEl.focus(); return; }
    btnAdd.disabled = true;
    const { data, error } = await db
      .from('shopping_items')
      .insert({ text, done: false })
      .select()
      .single();
    btnAdd.disabled = false;
    if (!error) {
      items.unshift(data);
      inputEl.value = '';
      render();
    }
    inputEl.focus();
  }

  async function toggleItem(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    const { error } = await db
      .from('shopping_items')
      .update({ done: !item.done })
      .eq('id', id);
    if (!error) {
      item.done = !item.done;
      render();
    }
  }

  async function deleteItem(id) {
    const { error } = await db
      .from('shopping_items')
      .delete()
      .eq('id', id);
    if (!error) {
      items = items.filter(i => i.id !== id);
      render();
    }
  }

  async function clearDone() {
    const doneIds = items.filter(i => i.done).map(i => i.id);
    if (doneIds.length === 0) return;
    const { error } = await db
      .from('shopping_items')
      .delete()
      .in('id', doneIds);
    if (!error) {
      items = items.filter(i => !i.done);
      render();
    }
  }

  listEl.addEventListener('click', e => {
    const li = e.target.closest('.item');
    if (!li) return;
    const id = li.dataset.id;
    if (e.target.closest('.item-check') || e.target.closest('.item-text')) {
      toggleItem(id);
    } else if (e.target.closest('.btn-delete')) {
      deleteItem(id);
    }
  });

  btnAdd.addEventListener('click', addItem);
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  btnClear.addEventListener('click', clearDone);

  loadItems();
</script>
</body>
</html>
